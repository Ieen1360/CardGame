<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Pife Online - Menu</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="firebase.js"></script>
</head>
<body>
    <div class="top-bar">
        <div id="user-info">
            <span id="display-name">...</span> | <span id="coins-count">💰 0</span>
        </div>
        <button onclick="auth.signOut().then(()=>window.location.href='index.html')" style="background:#e74c3c">Sair</button>
    </div>

    <div class="central-card">
        <h2>Salas</h2>
        <input type="text" id="roomInput" placeholder="Nome da Sala">
        <div style="display:flex; gap:10px;">
            <button id="createBtn" style="flex:1; background:#2980b9;">Criar</button>
            <button id="joinBtn" style="flex:1; background:#27ae60;">Entrar</button>
        </div>
    </div>

    <script>
        window.onload = () => {
            auth.onAuthStateChanged(user => {
                if (!user) { window.location.href = "index.html"; return; }
                
                document.getElementById('display-name').innerText = user.displayName || "Convidado";
                
                // Escuta moedas
                database.ref(`users/${user.uid}/coins`).on('value', snap => {
                    document.getElementById('coins-count').innerText = "💰 " + (snap.val() || 0);
                });
            });

            document.getElementById('createBtn').onclick = () => {
                const r = document.getElementById('roomInput').value.trim();
                if(r) window.location.href = `jogo.html?sala=${r.toLowerCase()}&role=p1`;
            };

            document.getElementById('joinBtn').onclick = () => {
                const r = document.getElementById('roomInput').value.trim();
                if(r) window.location.href = `jogo.html?sala=${r.toLowerCase()}&role=p2`;
            };
        };
    </script>
</body>
</html>

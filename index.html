<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Pife Online - Login</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="firebase.js"></script>
</head>
<body>
    <div id="auth-box" class="central-card">
        <h1>Pife Online</h1>
        <p>Entre para jogar com seus amigos</p>
        <button id="googleLoginBtn" style="background:#db4437;">Login com Google</button>
        <button id="guestBtn" style="background:#7f8c8d;">Entrar como Convidado</button>
    </div>

    <script>
        auth.onAuthStateChanged(user => {
            if (user) window.location.href = "menu.html";
        });
        document.getElementById('googleLoginBtn').onclick = () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
        document.getElementById('guestBtn').onclick = () => auth.signInAnonymously();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Pife Online</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
</head>
<body>
    <div id="lobby">
        <h1>PIFE ONLINE</h1>
        <input type="text" id="roomInput" placeholder="Nome da sala...">
        <div style="margin-top:20px">
            <button id="createBtn">CRIAR SALA</button>
            <button id="joinBtn">ENTRAR</button>
        </div>
    </div>

    <div id="waiting-lobby" style="display:none">
        <h2>Aguardando oponente...</h2>
    </div>

    <div id="game-container" style="display:none">
        <div id="status-bar">
            <span id="turn-display">CARREGANDO...</span>
            <span id="state-display"></span>
        </div>

        <div id="table">
            <div id="opponent-hand" class="hand"></div>
            
            <div class="center">
                <div id="deck" class="slot"><img src="" id="deck-img"><span>BARALHO</span></div>
                <div id="discard-pile" class="slot"><img src="" id="discard-img"><span>DESCARTE</span></div>
            </div>

            <div id="player-hand" class="hand"></div>
        </div>
    </div>

    <div id="decision-modal" class="modal" style="display:none">
        <div class="modal-content">
            <h3>VOCÊ COMPROU:</h3>
            <img id="drawn-card-img" src="">
            <div style="display:flex; gap:10px">
                <button id="keep-btn">FICAR</button>
                <button id="discard-instant-btn">LARGAR</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

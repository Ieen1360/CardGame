<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Pife Royale - Login & Amigos</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body>

    <div id="auth-overlay">
        <div id="login-box">
            <h1>Pife Royale</h1>
            <button id="googleLoginBtn">Entrar com Google</button>
            <button id="guestBtn">Jogar como Convidado</button>
        </div>
    </div>

    <div id="main-menu" style="display:none;">
        <div class="profile-bar">
            <img id="user-photo" src="">
            <span id="user-name"></span>
            <span id="user-coins-display">💰 0</span>
        </div>
        
        <div class="actions">
            <input type="text" id="roomInput" placeholder="Nome da Sala">
            <button id="createBtn">Criar Sala</button>
            <button id="joinBtn">Entrar na Sala</button>
        </div>

        <div class="friends-section">
            <p>Seu ID: <b id="my-uid-display"></b></p>
            <input type="text" id="addFriendInput" placeholder="ID do Amigo para Duelo">
            <button id="addFriendBtn">Desafiar Amigo</button>
        </div>
    </div>

    <div id="game-container" style="display:none;">
        <div id="turn-display"></div>
        <div id="state-display"></div>
        <div id="opponent-hand" class="hand"></div>
        <div class="center">
            <div id="deck" class="slot"><img id="deck-img"></div>
            <div id="discard-pile" class="slot"><img id="discard-img"></div>
        </div>
        <div id="player-hand" class="hand"></div>
    </div>

    <div id="decision-modal" style="display:none;">
        <img id="drawn-card-img">
        <button id="keep-btn">Ficar</button>
        <button id="discard-instant-btn">Largar</button>
    </div>

    <script src="firebase.js"></script>
    <script src="script.js"></script>
</body>
</html>

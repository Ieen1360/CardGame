<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pife Multiplayer - 9 Cartas</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="firebase.js"></script>
</head>
<body>

    <div id="lobby">
        <h1>Pife Online</h1>
        <input type="text" id="roomInput" placeholder="Nome da Sala">
        <div style="margin-top: 20px; display: flex; gap: 10px; justify-content: center;">
            <button id="createBtn" style="background-color: #2980b9;">Criar Sala</button>
            <button id="joinBtn">Entrar na Sala</button>
        </div>
    </div>

    <div id="waiting-lobby" style="display: none;">
        <div class="waiting-content">
            <h2>Aguardando Jogador...</h2>
            <div class="player-count">Jogadores: <span id="count-number">1</span> / 2</div>
            <div class="loader"></div>
        </div>
    </div>

    <div id="game-container" style="display: none;">
        <div id="status-bar">
            <span id="turn-display">Carregando...</span>
            <span id="state-display"></span>
        </div>
        <div id="table">
            <div id="opponent-hand" class="hand"></div>
            <div class="center-pile">
                <div id="deck" class="card-slot">
                    <img src="Cards/Classic/back.png" alt="Baralho">
                    <div class="label">BARALHO</div>
                </div>
                <div id="discard-pile" class="card-slot">
                    <img src="Cards/Classic/back.png" id="discard-img" alt="Descarte">
                    <div class="label">DESCARTE</div>
                </div>
            </div>
            <div id="player-hand" class="hand"></div>
        </div>

        <div id="decision-modal" class="modal">
            <div class="modal-content">
                <h3>Você comprou:</h3>
                <img id="drawn-card-img" src="" alt="Carta">
                <div class="actions">
                    <button id="keep-btn">Ficar</button>
                    <button id="discard-instant-btn">Descartar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pife Online - 9 Cartas</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    
    <script src="firebase.js"></script>
</head>
<body>

    <div id="auth-overlay">
        <div id="login-box">
            <h1>Pife Royale</h1>
            <p>Entre para salvar suas moedas</p>
            <button id="googleLoginBtn" class="login-btn google">Entrar com Google</button>
            <button id="guestBtn" class="login-btn guest">Jogar como Convidado</button>
        </div>
    </div>

    <div id="lobby" style="display: none;">
        <div class="user-info">
            <img id="user-photo" src="" style="width: 50px; border-radius: 50%; display: none;">
            <span id="user-name"></span> | <span id="user-coins-display">💰 0</span>
        </div>
        <p>Seu ID: <small id="my-uid-display"></small></p>
        
        <input type="text" id="roomInput" placeholder="Nome da Sala">
        <div style="margin-top: 10px; display: flex; gap: 10px; justify-content: center;">
            <button id="createBtn" style="background-color: #2980b9;">Criar Sala</button>
            <button id="joinBtn">Entrar na Sala</button>
        </div>
        <hr>
        <input type="text" id="addFriendInput" placeholder="ID do Amigo">
        <button id="addFriendBtn">Desafiar Amigo</button>
    </div>

    <div id="waiting-lobby" style="display: none;">
        <div class="waiting-content">
            <h2>Aguardando Jogador...</h2>
            <div class="loader"></div>
        </div>
    </div>

    <div id="game-container" style="display: none;">
        <div id="status-bar">
            <span id="turn-display">Carregando...</span>
            <span id="state-display"></span>
        </div>
        <div id="table">
            <div id="opponent-hand" class="hand"></div>
            <div class="center-pile">
                <div id="deck" class="card-slot">
                    <img src="Cards/Classic/Card-Back-01.png" alt="Baralho">
                    <div class="label">BARALHO</div>
                </div>
                <div id="discard-pile" class="card-slot">
                    <img src="Cards/Classic/Card-Back-01.png" id="discard-img" alt="Descarte">
                    <div class="label">DESCARTE</div>
                </div>
            </div>
            <div id="player-hand" class="hand"></div>
        </div>

        <div id="decision-modal" class="modal">
            <div class="modal-content">
                <h3>Você comprou:</h3>
                <img id="drawn-card-img" src="" alt="Carta">
                <div class="actions">
                    <button id="keep-btn">Ficar</button>
                    <button id="discard-instant-btn">Descartar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
